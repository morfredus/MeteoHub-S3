<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoHub S3</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js depuis CDN pour l'exemple (à télécharger localement pour usage hors ligne strict) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Injection des valeurs min/max pour les graphiques -->
    <script src="graph_config.js"></script>
</head>
<body data-page="dashboard">
    <div class="container">
        <header>
            <h1>MeteoHub S3</h1>
            <div class="header-right">
                <span id="sensorInvalidBadge" class="sensor-badge" hidden>Capteur invalide</span>
                <div id="status">Connexion...</div>
            </div>
        </header>

        <nav data-shared-menu="true" data-active="/"></nav>

        <div class="grid">
            <div class="card">
                <h2>Température</h2>
                <div><span id="temp" class="value">--</span> <span class="unit">°C</span></div>
            </div>
            <div class="card">
                <h2>Humidité</h2>
                <div><span id="hum" class="value">--</span> <span class="unit">%</span></div>
            </div>
            <div class="card">
                <h2>Pression</h2>
                <div><span id="pres" class="value">--</span> <span class="unit">hPa</span></div>
            </div>
        </div>

        <div class="card" id="alertCard" style="margin-bottom: 20px;">
            <h2>Alerte météo</h2>
            <div id="alertText">Aucune alerte</div>
            <div id="alertValidity" class="alert-validity">Validité : --</div>
            <div id="alertDetailsBody"></div>
        </div>

        <div class="chart-container">
            <canvas id="historyChart"></canvas>
            <div class="graph-controls" style="margin-top:10px; display:flex; flex-direction:column; align-items:center;">
                <div style="display:flex; align-items:center; gap:12px;">
                    <label for="scaleMode">Échelle :</label>
                    <select id="scaleMode" onchange="setGraphScaleMode(Number(this.value))">
                        <option value="0">Fixe</option>
                        <option value="1">Dynamique</option>
                        <option value="2" selected>Mixte</option>
                    </select>
                    <label for="scaleMargin" style="margin-left:10px;">Élargissement (%) :</label>
                    <input type="range" id="scaleMargin" min="0" max="50" value="20" step="1" style="vertical-align:middle;" oninput="setGraphScaleMarginPct(Number(this.value))">
                    <span id="scaleMarginValue">20</span>%
                </div>
            </div>
        </div>

        <footer>
        </footer>
    </div>

    <script src="app.js"></script>
    <script src="menu.js"></script>
    <script src="footer.js"></script>
</body>
</html>
